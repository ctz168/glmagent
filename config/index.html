<!DOCTYPE html>
<html>

<head>
    <style>
        :root { color-scheme: light dark; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Helvetica Neue', Arial, 'Noto Sans', 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji', sans-serif;
            background: transparent;
        }
        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2rem; /* gap-8 */
            padding: 1rem; /* p-4 */
        }
        .logo-wrap {
            position: relative; /* relative */
            width: 6rem;  /* w-24 */
            height: 6rem; /* h-24 */
        }
        .logo {
            width: 100%;
            height: 100%;
            object-fit: contain; /* object-contain */
            opacity: 0.9;
        }
    </style>
    <script>
		setTimeout(() => {
            window.location.href = window.location.href;
        }, 1000);
    </script>
</head>

<body>
    <div class='container'>
        <div class='logo-wrap'>
            <img src='/logo.svg' alt='GLM Agent Logo' class='logo' />
        </div>
    </div>
</body>

</html>
